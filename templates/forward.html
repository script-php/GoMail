{{define "content"}}
<div class="compose-container">
    <div class="compose-card">
        <div class="compose-header">
            <h2>Forward Message</h2>
        </div>
        <form method="POST" action="/forward-send">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <input type="hidden" name="original_message_id" value="{{.OriginalMsg.ID}}">
            <div class="compose-body">
                <div class="compose-field">
                    <label for="from">From</label>
                    <input type="text" id="from" value="{{.Account.Email}}" disabled>
                </div>
                <div class="compose-field">
                    <label for="to">To</label>
                    <input type="email" id="to" name="to" required placeholder="Recipients">
                </div>
                <div class="compose-field">
                    <label for="cc">Cc</label>
                    <input type="text" id="cc" name="cc" placeholder="Cc (optional)">
                </div>
                <div class="compose-field">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required value="{{.OriginalSubject}}">
                </div>
                <textarea id="forward_notes" name="forward_notes" class="compose-textarea" rows="6"
                          placeholder="Add a note (optional)..." style="min-height:120px"></textarea>

                <div class="original-message">
                    <div class="original-message-header">Original Message</div>
                    <div class="original-message-meta">
                        <div><strong>From:</strong> {{.OriginalFrom}}</div>
                        <div><strong>To:</strong> {{.OriginalTo}}</div>
                        {{if .OriginalCC}}<div><strong>Cc:</strong> {{.OriginalCC}}</div>{{end}}
                        <div><strong>Subject:</strong> {{.OriginalMsg.Subject}}</div>
                        <div><strong>Date:</strong> {{.OriginalMsg.ReceivedAt.Format "Jan 02, 2006 15:04 MST"}}</div>
                    </div>
                    <div class="original-message-body">{{.OriginalText}}</div>
                </div>
            </div>
            <div class="compose-actions">
                <button type="submit" class="btn btn-primary">Forward</button>
                <a href="/message/{{.OriginalMsg.ID}}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
{{end}}
