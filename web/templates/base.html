{{define "base.html"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - GoMail</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {{if .Section}}
    <nav class="sidebar">
        <div class="logo">
            <h1>GoMail</h1>
        </div>
        <ul class="nav-links">
            <li class="{{if eq .Section "compose"}}active{{end}}">
                <a href="/compose">&#9998; Compose</a>
            </li>
            <li class="{{if eq .Section "inbox" "inbound"}}active{{end}}">
                <a href="/inbox">&#9993; Inbox
                    {{if .Unread}}<span class="badge">{{.Unread}}</span>{{end}}
                </a>
            </li>
            <li class="{{if eq .Section "sent" "outbound"}}active{{end}}">
                <a href="/sent">&#10148; Sent</a>
            </li>
            {{if and .Account .Account.IsAdmin}}
            <li class="nav-divider"></li>
            <li class="{{if eq .Section "admin"}}active{{end}}">
                <a href="/admin/domains">&#9881; Admin</a>
            </li>
            {{end}}
        </ul>
        <div class="nav-footer">
            {{if .Account}}<div class="nav-user">{{.Account.Email}}</div>{{end}}
            <a href="/logout" class="logout-link">Logout</a>
        </div>
    </nav>
    {{end}}
    <main class="{{if .Section}}with-sidebar{{end}}">
        {{template "content" .}}
    </main>
    <script src="/static/app.js"></script>
</body>
</html>{{end}}
