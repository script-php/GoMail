{{define "content"}}
<div class="content-header">
    <h2>Forward Message</h2>
</div>

<div class="compose-form">
    <form method="POST" action="/forward-send">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <input type="hidden" name="original_message_id" value="{{.OriginalMsg.ID}}">

        <div class="form-group">
            <label for="from">From</label>
            <input type="text" id="from" value="{{.Account.Email}}" disabled>
        </div>

        <div class="form-group">
            <label for="to">Forward To</label>
            <input type="email" id="to" name="to" required
                   placeholder="recipient@example.com">
        </div>

        <div class="form-group">
            <label for="cc">Cc</label>
            <input type="text" id="cc" name="cc"
                   placeholder="cc@example.com (optional)">
        </div>

        <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required
                   value="{{.OriginalSubject}}">
        </div>

        <div class="form-group">
            <label for="forward_notes">Your Notes (Optional)</label>
            <textarea id="forward_notes" name="forward_notes" rows="6"
                      placeholder="Add any notes about why you're forwarding this..."></textarea>
        </div>

        <fieldset style="margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 4px;">
            <legend style="padding: 0 10px;"><strong>Original Message</strong></legend>
            
            <div style="margin: 10px 0;">
                <strong>From:</strong> {{.OriginalFrom}}
            </div>
            <div style="margin: 10px 0;">
                <strong>To:</strong> {{.OriginalTo}}
            </div>
            {{if .OriginalCC}}
            <div style="margin: 10px 0;">
                <strong>Cc:</strong> {{.OriginalCC}}
            </div>
            {{end}}
            <div style="margin: 10px 0;">
                <strong>Subject:</strong> {{.OriginalMsg.Subject}}
            </div>
            <div style="margin: 10px 0;">
                <strong>Date:</strong> {{.OriginalMsg.ReceivedAt.Format "Jan 02, 2006 15:04 MST"}}
            </div>

            <div style="margin-top: 15px; padding: 10px; background: #f5f5f5; border-radius: 4px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-wrap: break-word; font-size: 0.9em;">
{{.OriginalText}}
            </div>
        </fieldset>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Forward</button>
            <a href="/message/{{.OriginalMsg.ID}}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<style>
.compose-form {
    max-width: 900px;
    margin: 20px auto;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
    color: #333;
}

.form-group input[type="text"],
.form-group input[type="email"],
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
}

.form-group textarea {
    resize: vertical;
    min-height: 100px;
}

.form-group input:disabled {
    background-color: #f5f5f5;
    color: #666;
    cursor: not-allowed;
}

.form-actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    text-align: center;
}

.btn-primary {
    background-color: #007bff;
    color: white;
}

.btn-primary:hover {
    background-color: #0056b3;
}

.btn-secondary {
    background-color: #6c757d;
    color: white;
}

.btn-secondary:hover {
    background-color: #5a6268;
}
</style>
{{end}}
